<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar sesión</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.ico') }}">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Quicksand', sans-serif;
  background-color:#fff5f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#f7f2e6;
  padding:2.5rem;
  border-radius:25px;
  width:350px;
  box-shadow:0 5px 20px rgba(214,61,114,0.15);
  text-align:center;
}

h1{
  font-family:'Playfair Display', serif;
  color:#e8638c;
}

p{
  color:#a0668a;
}

input{
  width:100%;
  padding:0.8rem;
  margin:0.7rem 0;
  border-radius:12px;
  border:1.5px solid #ffe8f0;
  background:#fff5f8;
  font-size:0.9rem;
}

input:focus{
  outline:none;
  border-color:#e8638c;
}

button{
  margin-top:1rem;
  width:100%;
  padding:0.8rem;
  border:none;
  border-radius:30px;
  background:#e8638c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#f586a7;
}

.link{
  margin-top:1rem;
  font-size:0.85rem;
}

a{
  color:#e8638c;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="card">
  <h1>🌸 Bienvenido</h1>
  <p>Ingresá a tu jardín emocional</p>

  <form method="POST">
    <input type="email" name="email" placeholder="Correo electrónico" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button>Entrar</button>
  </form>

  {% if error %}
  <div style="color:red; margin:10px 0;">{{ error }}</div>
  {% endif %}

  <div class="link">
    ¿No tenés cuenta? <a href="/registro">Registrarse</a>
  </div>
</div>
</body>
</html>
