<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi jardín</title>
</head>
<body>

<h1>🌸 Mi Jardin</h1>

{% if emociones %}
  <ul>
  {% for item in emociones %}
    <li>
      {{ item.emocion }} - {{ item.nota }}
    </li>
  {% endfor %}
  </ul>
{% else %}
  <p>No hay flores plantadas todavía </p>
{% endif %}

<a href="/">Volver</a>

</body>
</html>
